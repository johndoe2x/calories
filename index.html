<!DOCTYPE html>
<html>
<head>
  <title>Fat Loss Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      padding: 20px;
    }
    input {
      width: 70px;
      padding: 5px;
      margin: 5px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 600px;
    }
    td, th {
      border: 1px solid #444;
      padding: 10px;
      text-align: center;
    }
    button {
      padding: 10px;
      margin-top: 10px;
      background: #00ff88;
      border: none;
      cursor: pointer;
    }
    .box {
      margin-top: 20px;
      padding: 15px;
      background: #222;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h2>🔥 Fat Loss Dashboard</h2>

<!-- FOOD TABLE -->
<table>
  <tr>
    <th>Food</th>
    <th>Qty</th>
    <th>Calories (each)</th>
    <th>Total</th>
  </tr>

  <tr>
    <td>Egg Omelette</td>
    <td><input type="number" id="egg" value="0"></td>
    <td>90</td>
    <td id="eggTotal">0</td>
  </tr>

  <tr>
    <td>Fish Piece</td>
    <td><input type="number" id="fish" value="0"></td>
    <td>100</td>
    <td id="fishTotal">0</td>
  </tr>

  <tr>
    <td>Mutton (1 bowl ~150g)</td>
    <td><input type="number" id="mutton" value="0"></td>
    <td>300</td>
    <td id="muttonTotal">0</td>
  </tr>

  <tr>
    <td>Majjiga (1 glass)</td>
    <td><input type="number" id="majjiga" value="0"></td>
    <td>60</td>
    <td id="majjigaTotal">0</td>
  </tr>

</table>

<button onclick="calculate()">Calculate Calories</button>

<h2>Total Calories: <span id="total">0</span> kcal</h2>

<!-- STEPS SECTION -->
<div class="box">
  <h3>🚶 Steps & Fat Loss</h3>

  <label>Daily Steps:</label>
  <input type="number" id="steps" value="10000">

  <br><br>

  <label>Target Fat Loss (kg):</label>
  <input type="number" id="targetKg" value="1">

  <br><br>

  <button onclick="calculateFatLoss()">Calculate Fat Loss Time</button>

  <h3>📊 Results</h3>
  <p>Calories burned from steps/day: <span id="stepCalories">0</span> kcal</p>
  <p>Days to lose 1 kg: <span id="days1kg">0</span></p>
  <p>Days to reach target: <span id="daysTarget">0</span></p>
</div>

<script>

// FOOD CALCULATION
function calculate() {
  let egg = document.getElementById("egg").value * 90;
  let fish = document.getElementById("fish").value * 100;
  let mutton = document.getElementById("mutton").value * 300;
  let majjiga = document.getElementById("majjiga").value * 60;

  document.getElementById("eggTotal").innerText = egg;
  document.getElementById("fishTotal").innerText = fish;
  document.getElementById("muttonTotal").innerText = mutton;
  document.getElementById("majjigaTotal").innerText = majjiga;

  let total = egg + fish + mutton + majjiga;
  document.getElementById("total").innerText = total;
}

// FAT LOSS CALCULATION
function calculateFatLoss() {
  let steps = document.getElementById("steps").value;
  let targetKg = document.getElementById("targetKg").value;

  let caloriesPerStep = 0.04; 
  let caloriesBurned = steps * caloriesPerStep;

  let daysFor1kg = 7700 / caloriesBurned;
  let daysForTarget = daysFor1kg * targetKg;

  let months = (daysForTarget / 30).toFixed(1);
  let weeks = (daysForTarget / 7).toFixed(1);

  document.getElementById("stepCalories").innerText = Math.round(caloriesBurned);
  document.getElementById("days1kg").innerText = Math.round(daysFor1kg);

  document.getElementById("daysTarget").innerText =
    Math.round(daysForTarget) + " days (" + weeks + " weeks / " + months + " months)";
}

</script>

</body>
</html>
